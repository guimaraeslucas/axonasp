# .github/workflows/build-packages.yml
name: Build OS Packages

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main

jobs:
  build-packages:
    name: Build DEB, RPM & APK Packages
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for GitHub Releases

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version string
        id: version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION_CLEAN=${GITHUB_REF_NAME#v}
            echo "value=${VERSION_CLEAN}" >> "$GITHUB_OUTPUT"
          else
            PATCH=$(git rev-list --count HEAD 2>/dev/null || echo "0")
            REVISION=$(git rev-parse --short HEAD 2>/dev/null || echo "0")
            echo "value=2.0.${PATCH}.${REVISION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Go binaries
        env:
          FULL_VERSION: ${{ steps.version.outputs.value }}
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "-s -w -X main.Version=${FULL_VERSION}" -o axonasp-http ./server
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "-s -w -X main.Version=${FULL_VERSION}" -o axonasp-fastcgi ./fastcgi
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "-s -w -X main.Version=${FULL_VERSION}" -o axonasp-cli ./cli
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "-s -w -X main.Version=${FULL_VERSION}" -o axonasp-mcp ./mcp
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "-s -w -X main.Version=${FULL_VERSION}" -o axonasp-service ./service
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "-s -w -X main.Version=${FULL_VERSION}" -o axonasp-testsuite ./testsuite

      - name: Remove test directory from www
        run: |
          echo "Removing ./www/test/ to exclude it from the package..."
          rm -rf ./www/test/ || true

      - name: Install nFPM
        run: |
          echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' | sudo tee /etc/apt/sources.list.d/goreleaser.list
          sudo apt-get update
          sudo apt-get install -y nfpm

      - name: Build Debian package (.deb)
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: nfpm package --packager deb --target .

      - name: Build Red Hat package (.rpm)
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: nfpm package --packager rpm --target .

      - name: Build Alpine package (.apk)
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: nfpm package --packager apk --target .

      - name: Upload Linux Packages as Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: axonasp-linux-packages
          path: |
            *.deb
            *.rpm
            *.apk

      - name: Publish to GitHub Releases
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.deb
            *.rpm
            *.apk