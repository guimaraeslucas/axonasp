# Nginx configuration for AxonASP FastCGI mode
# Place this file at docker/nginx-fastcgi.conf and mount to /etc/nginx/conf.d/default.conf

server {
    listen 80;
    server_name _;  # Accept any hostname
    
    root /var/www/asp;
    index default.asp default.aspx index.asp index.aspx;

    # Logging
    access_log /var/log/nginx/axonasp-access.log;
    error_log /var/log/nginx/axonasp-error.log;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Process ASP files via FastCGI
    location ~ \.(asp|aspx)$ {
        fastcgi_pass   axonaspcgi:9000;
        fastcgi_index  default.asp;
        
        # Standard FastCGI parameters
        fastcgi_param  SCRIPT_FILENAME  $document_root$fastcgi_script_name;
        fastcgi_param  QUERY_STRING     $query_string;
        fastcgi_param  REQUEST_METHOD   $request_method;
        fastcgi_param  CONTENT_TYPE     $content_type;
        fastcgi_param  CONTENT_LENGTH   $content_length;
        
        fastcgi_param  SCRIPT_NAME      $fastcgi_script_name;
        fastcgi_param  REQUEST_URI      $request_uri;
        fastcgi_param  DOCUMENT_URI     $document_uri;
        fastcgi_param  DOCUMENT_ROOT    $document_root;
        fastcgi_param  SERVER_PROTOCOL  $server_protocol;
        
        fastcgi_param  GATEWAY_INTERFACE  CGI/1.1;
        fastcgi_param  SERVER_SOFTWARE    nginx/$nginx_version;
        fastcgi_param  REMOTE_ADDR        $remote_addr;
        fastcgi_param  REMOTE_PORT        $remote_port;
        fastcgi_param  SERVER_ADDR        $server_addr;
        fastcgi_param  SERVER_PORT        $server_port;
        fastcgi_param  SERVER_NAME        $server_name;
        
        fastcgi_param  HTTPS              $https if_not_empty;
        
        # FastCGI buffering and timeouts
        fastcgi_buffering on;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
        fastcgi_connect_timeout 30s;
        fastcgi_send_timeout 30s;
        fastcgi_read_timeout 30s;
    }

    # Serve static files directly (much faster than through ASP)
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot|otf|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Deny access to sensitive files
    location ~ /\. {
        return 404;
        access_log off;
        log_not_found off;
    }

    location ~ \.(inc|asa|bak|config|md|json|go|mod|sum)$ {
        return 404;
        access_log off;
        log_not_found off;
    }

    # Try to serve file directly, fallback to ASP routing
    location / {
        try_files $uri $uri/ @asp;
    }

    # ASP routing fallback
    location @asp {
        rewrite ^/(.*)$ /default.asp?path=$1 last;
    }
}
