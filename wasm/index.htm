<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>AxonASP WASM Playground</title>
        <link rel="stylesheet" href="axonasp.css" />
        <script src="wasm_exec.js"></script>
    </head>

    <body class="wasm-playground-page">
        <div id="header">
            <div class="logo">
                <img src="https://g3pix.com.br/axonasp/logo_square.svg" alt="AxonASP" width="43" height="43" />
            </div>
            <h1>AxonASP Server</h1>
        </div>

        <main class="wasm-playground-shell">
            <div class="card wasm-playground-card">
                <h1>AxonASP WASM Playground</h1>
                <div id="status" class="wasm-status is-loading">Loading WASM module...</div>

                <div>
                    <textarea id="code" class="wasm-playground-editor"><%
Dim Axon
Set Axon = Server.CreateObject("G3AXONLIVE")

If Axon.InitPage() Then
    ' We are handling an async WASM event!
    If Axon.EventName = "click" Then
        Dim currentCount
        currentCount = Axon.GetComponentProperty("btn1", "data-count")
        
        If IsEmpty(currentCount) Or currentCount = "" Then currentCount = 0
        currentCount = CInt(currentCount) + 1
        
        ' Update internal state
        Axon.SetComponentProperty "btn1", "data-count", currentCount
        
        ' Directly manipulate the DOM via WASM syscall/js!
        Dim comp
        Set comp = Axon.GetComponent("btn1")
        comp.SetStyle "background", "green"
        comp.SetStyle "color", "white"
        comp.SetValue "Clicked " & currentCount & " times!"
    ElseIf Axon.EventName = "ask_name" Then
        Dim userName
        userName = InputBox("What is your name?", "AxonASP WASM", "Guest")
        
        If userName <> "" Then
            If MsgBox("Hello " & userName & "! Do you like WebAssembly?", vbYesNo + vbQuestion) = vbYes Then
                MsgBox "Great! AxonASP loves WASM too."
            Else
                MsgBox "Oh, maybe next time!"
            End If
        End If
    End If
    
    Axon.EndAsyncResponse()
End If

' Initial Page Render
Response.Write "<h1>AxonLive in WASM!</h1>"
Response.Write "<p>Click the buttons to interact with the AxonASP engine natively in your browser.</p>"
Response.Write "<button id='btn1' onclick='dispatchLiveEvent(""btn1"", ""click"")'>Reactive Counter</button> "
Response.Write "<button id='btn2' onclick='dispatchLiveEvent(""btn2"", ""ask_name"")'>Interactive Prompts</button>"
%></textarea>
                    <div class="wasm-playground-actions">
                        <button onclick="runCode()" id="runBtn" class="btn btn-primary" disabled>Run ASP Code</button>
                    </div>
                </div>

                <h2>Output</h2>
                <pre id="output" class="wasm-playground-output"></pre>
            </div>
        </main>

        <script>
            const go = new Go();
            WebAssembly.instantiateStreaming(fetch("axonasp.wasm"), go.importObject).then((result) => {
                go.run(result.instance);
                document.getElementById("status").innerText = "AxonASP module ready.";
                document.getElementById("status").className = "wasm-status is-ready";
                document.getElementById("runBtn").disabled = false;
            }).catch((err) => {
                document.getElementById("status").innerText = "Error loading AxonASP module: " + err;
                document.getElementById("status").className = "wasm-status is-error";
            });

            // AxonLive Shim for WASM
            window.G3AxonLive = {
                currentCode: "",
                dispatch: async function (componentId, eventName, eventArgs = {}) {
                    if (typeof AxonASP !== "undefined") {
                        try {
                            // Call WASM dispatchLiveEvent
                            await AxonASP.dispatchLiveEvent("wasm-session", componentId, eventName, JSON.stringify(eventArgs), this.currentCode);
                        } catch (e) {
                            console.error("AxonLive WASM Error:", e);
                        }
                    }
                }
            };

            // Global wrapper function so onclick="dispatchLiveEvent(...)" inside ASP code works
            window.dispatchLiveEvent = function (componentId, eventName, eventArgs = {}) {
                window.G3AxonLive.dispatch(componentId, eventName, eventArgs);
            };

            // Execute the playground script in async mode.
            async function runCode() {
                const outEl = document.getElementById("output");
                const runBtn = document.getElementById("runBtn");

                if (typeof AxonASP !== "undefined") {
                    const code = document.getElementById("code").value;
                    window.G3AxonLive.currentCode = code; // Save code for live events

                    try {
                        runBtn.disabled = true;
                        outEl.innerHTML = "<em>Running in WebAssembly...</em>";

                        const result = await AxonASP.execute(code);

                        outEl.innerHTML = result; // Render the runtime output.
                    } catch (e) {
                        outEl.innerText = "Exception: " + e;
                    } finally {
                        runBtn.disabled = false;
                    }
                } else {
                    outEl.innerText = "AxonASP module not loaded yet.";
                }
            }
        </script>
    </body>

</html>
