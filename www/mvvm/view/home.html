<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{{.PageTitle}}</title>
        <link rel="stylesheet" href="../css/axonasp.css">
    </head>

    <body>
        <div class="container">
            <h1>{{.Header}}</h1>
            <p>{{.Subtitle}}</p>
            <ul>
                {{range .Metrics}}
                <li>{{.}}</li>
                {{end}}
            </ul>
            <p><a href="default.asp?page=example">Go to example page</a></p>
            <p><a href="../default.asp">Back to root default page</a></p>
        </div>
    </body>

</html>
